<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monitor — ParkGuard</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-subtle: #6e7681;
            --accent: #4493f8;
            --accent-hover: #58a6ff;
            --accent-dim: rgba(68,147,248,.12);
            --green: #3fb950;
            --green-dim: rgba(63,185,80,.12);
            --yellow: #e3b341;
            --yellow-dim: rgba(227,179,65,.12);
            --red: #f85149;
            --red-dim: rgba(248,81,73,.12);
            --indigo: #818cf8;
            --indigo-dim: rgba(129,140,248,.12);
            --r: 6px;
            --r-lg: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ─── TOPBAR ─── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            height: 54px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 0.975rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #fff;
        }

        .topbar-nav {
            display: flex;
            align-items: center;
            gap: 0.1rem;
            flex: 1;
        }

        .nav-link {
            padding: 0.35rem 0.7rem;
            border-radius: var(--r);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.825rem;
            font-weight: 500;
            transition: background .12s, color .12s;
        }

        .nav-link:hover { background: var(--surface-2); color: var(--text); }
        .nav-link.active { background: var(--accent-dim); color: var(--accent); }

        /* ─── LAYOUT ─── */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem;
            display: grid;
            gap: 1.25rem;
        }

        /* ─── TOOLBAR ─── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .toolbar-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.85rem;
            border-radius: var(--r);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            transition: background .12s, border-color .12s;
            white-space: nowrap;
            font-family: inherit;
        }

        .btn:hover { background: var(--border); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }

        /* ─── CARD / TABLE ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            padding: 0.6rem 1rem;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            white-space: nowrap;
        }

        td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 0.84rem;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background .1s; }
        tbody tr:hover { background: rgba(255,255,255,.025); }

        /* ─── PILLS ─── */
        .pill {
            display: inline-flex;
            align-items: center;
            padding: 0.18rem 0.55rem;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .pill-entry    { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(68,147,248,.25); }
        .pill-exit     { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(227,179,65,.25); }
        .pill-registered   { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(63,185,80,.25); }
        .pill-guest    { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(227,179,65,.25); }
        .pill-unregistered { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,81,73,.25); }
        .pill-uncertain    { background: var(--indigo-dim); color: var(--indigo); border: 1px solid rgba(129,140,248,.25); }

        /* ─── BADGES ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.18rem 0.55rem;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .badge-live { background: var(--green-dim); color: var(--green); }
        .badge-wait { background: var(--yellow-dim); color: var(--yellow); }
        .badge-off  { background: rgba(255,255,255,.05); color: var(--text-muted); }

        /* ─── MISC CELL HELPERS ─── */
        .mono { font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Menlo, monospace; font-size: 0.78rem; }
        .muted { color: var(--text-muted); text-align: center; padding: 2.5rem; font-size: 0.875rem; }
        .muted a { color: var(--accent); text-decoration: none; }

        .color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,.12);
        }

        .plate-cell { display: flex; align-items: center; gap: 0.4rem; }
        .owner-cell { font-size: 0.82rem; }
        .spot-cell  { font-size: 0.74rem; color: var(--text-muted); font-family: 'SF Mono', ui-monospace, monospace; }

        /* ─── PAGINATION ─── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 1rem;
            border-top: 1px solid var(--border);
            background: var(--surface-2);
            gap: 0.75rem;
        }

        /* ─── LIVE PANEL ─── */
        .live-panel { display: none; }
        .live-panel.open { display: block; }

        .live-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
        }

        .live-panel-head-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .viewer {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
            max-height: 60vh;
        }

        .viewer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .viewer-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .legend {
            display: flex;
            gap: 1.25rem;
            padding: 0.6rem 1rem;
            border-top: 1px solid var(--border);
            background: var(--surface-2);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">
            <div class="brand-icon">P</div>
            ParkGuard
        </a>
        <nav class="topbar-nav">
            <a href="/" class="nav-link active">Monitor</a>
            <a href="/vehicles" class="nav-link">Vehicles</a>
            <a href="/submit" class="nav-link">Register</a>
            <a href="/admin" class="nav-link">Admin</a>
            <a href="/login" class="nav-link">Login</a>
        </nav>
    </header>

    <main class="main">
        <div class="toolbar">
            <div class="toolbar-meta">
                <span class="live-dot"></span>
                <span id="logsMeta">Loading logs…</span>
            </div>
            <div class="btn-group">
                <button type="button" class="btn" id="refreshBtn">↻ Refresh</button>
                <button type="button" class="btn btn-primary" id="toggleLiveBtn">▶ Live camera</button>
            </div>
        </div>

        <section class="card">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Plate</th>
                        <th>Direction</th>
                        <th>Status</th>
                        <th>Owner</th>
                        <th>Spot</th>
                        <th>Photo</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr><td class="muted" colspan="7">Loading…</td></tr>
                </tbody>
            </table>
            <div class="pagination">
                <button type="button" class="btn btn-sm" id="prevBtn" disabled>← Prev</button>
                <span class="toolbar-meta" id="pageInfo">Page 1</span>
                <button type="button" class="btn btn-sm" id="nextBtn" disabled>Next →</button>
            </div>
        </section>

        <section class="card live-panel" id="livePanel" aria-hidden="true">
            <div class="live-panel-head">
                <div class="live-panel-head-left">
                    <span>Live camera</span>
                    <span id="camBadge" class="badge badge-off">Off</span>
                </div>
                <button type="button" class="btn btn-sm" id="hideLiveBtn">Hide</button>
            </div>
            <div class="viewer">
                <img id="liveStream" alt="Live camera feed" style="display:none;">
                <div class="viewer-placeholder" id="placeholder">Open live view to connect…</div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#3fb950;"></div> Registered</div>
                <div class="legend-item"><div class="legend-dot" style="background:#e3b341;"></div> Guest</div>
                <div class="legend-item"><div class="legend-dot" style="background:#f85149;"></div> Unregistered</div>
                <div class="legend-item"><div class="legend-dot" style="background:#818cf8;"></div> Uncertain</div>
            </div>
        </section>
    </main>

    <script>
        const PAGE_SIZE = 10;
        const LOGS_REFRESH_MS = 5000;
        let currentPage = 1;
        let liveOpen = false;
        let statusTimer = null;
        let logsRefreshTimer = null;

        const logsBody = document.getElementById("logsBody");
        const logsMeta = document.getElementById("logsMeta");
        const pageInfo = document.getElementById("pageInfo");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const refreshBtn = document.getElementById("refreshBtn");
        const toggleLiveBtn = document.getElementById("toggleLiveBtn");
        const hideLiveBtn = document.getElementById("hideLiveBtn");
        const livePanel = document.getElementById("livePanel");
        const streamImg = document.getElementById("liveStream");
        const placeholder = document.getElementById("placeholder");
        const camBadge = document.getElementById("camBadge");

        function authHeaders() {
            const h = { Accept: "application/json" };
            const t = localStorage.getItem("access_token");
            if (t) h.Authorization = "Bearer " + t;
            return h;
        }

        function escapeHtml(input) {
            return String(input ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function directionPill(dir) {
            if (dir === "exit") return "<span class='pill pill-exit'>Exit</span>";
            return "<span class='pill pill-entry'>Entry</span>";
        }

        function statusPill(row) {
            if (row.match_status === "uncertain") {
                return "<span class='pill pill-uncertain'>Uncertain</span>";
            }
            if (row.match_status === "registered" && row.is_guest) {
                return "<span class='pill pill-guest'>Guest</span>";
            }
            if (row.match_status === "registered") {
                return "<span class='pill pill-registered'>Registered</span>";
            }
            return "<span class='pill pill-unregistered'>Unregistered</span>";
        }

        function formatTime(iso) {
            if (!iso) return "—";
            try { return new Date(iso).toLocaleString(); } catch (_) { return iso; }
        }

        const COLOR_CSS = {
            white:   "#e8e8e8",
            yellow:  "#f5c518",
            blue:    "#2563eb",
            green:   "#16a34a",
            red:     "#dc2626",
            black:   "#374151",
            unknown: "#4b5563",
        };

        function colorDot(color) {
            if (!color || color === "unknown" || color === "default") return "";
            const bg = COLOR_CSS[color] || "#4b5563";
            const title = color.charAt(0).toUpperCase() + color.slice(1);
            return "<span class='color-dot' style='background:" + bg + "' title='Plate: " + title + "'></span>";
        }

        function plateCell(row) {
            const plate = escapeHtml(row.plate_number || row.plate_normalized || "—");
            const dot = colorDot(row.plate_color);
            return "<div class='plate-cell mono'>" + dot + plate + "</div>";
        }

        function ownerCell(row) {
            if (!row.owner_name && !row.owner_lastname) return "<span style='color:#4b5563'>—</span>";
            const parts = [row.owner_name, row.owner_lastname].filter(Boolean);
            return "<span class='owner-cell'>" + escapeHtml(parts.join(" ")) + "</span>";
        }

        function spotCell(row) {
            const parts = [];
            if (row.floor_number)  parts.push("F" + row.floor_number);
            if (row.door_number)   parts.push("D" + row.door_number);
            if (row.parking_spot)  parts.push("#" + row.parking_spot);
            if (row.car_model)     parts.push(row.car_model);
            if (!parts.length) return "<span style='color:#4b5563'>—</span>";
            return "<span class='spot-cell'>" + escapeHtml(parts.join(" · ")) + "</span>";
        }

        function snapshotCell(row) {
            if (!row.snapshot_url) return "—";
            return (
                "<a href='" + escapeHtml(row.snapshot_url) + "' target='_blank' rel='noopener'>" +
                "<img src='" + escapeHtml(row.snapshot_url) + "' alt='' style='width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid #30363d;' loading='lazy'>" +
                "</a>"
            );
        }

        async function loadLogs(page, opts = {}) {
            const silent = opts.silent === true;
            currentPage = page;
            if (!silent) {
                logsMeta.textContent = "Loading…";
                logsBody.innerHTML = "<tr><td class='muted' colspan='7'>Loading…</td></tr>";
            }

            try {
                const res = await fetch(
                    "/api/parking-logs?page=" + page + "&page_size=" + PAGE_SIZE,
                    { credentials: "include", headers: authHeaders() }
                );
                if (res.status === 401) {
                    logsMeta.textContent = "Login required.";
                    logsBody.innerHTML = "<tr><td class='muted' colspan='7'>Please <a href='/login'>log in</a> to view logs.</td></tr>";
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                    return;
                }
                const data = await res.json();
                const rows = Array.isArray(data.logs) ? data.logs : [];
                const total = data.total ?? rows.length;
                const pageNum = data.page ?? page;

                logsMeta.textContent = total + " total events · auto-refresh 5s";
                pageInfo.textContent = "Page " + pageNum + " · " + rows.length + " shown";
                prevBtn.disabled = !data.has_prev;
                nextBtn.disabled = !data.has_next;

                if (!rows.length) {
                    logsBody.innerHTML = "<tr><td class='muted' colspan='7'>No parking logs yet.</td></tr>";
                    return;
                }

                logsBody.innerHTML = rows.map((r) => (
                    "<tr>" +
                    "<td class='mono'>" + escapeHtml(formatTime(r.logged_at)) + "</td>" +
                    "<td>" + plateCell(r) + "</td>" +
                    "<td>" + directionPill(r.direction) + "</td>" +
                    "<td>" + statusPill(r) + "</td>" +
                    "<td>" + ownerCell(r) + "</td>" +
                    "<td>" + spotCell(r) + "</td>" +
                    "<td>" + snapshotCell(r) + "</td>" +
                    "</tr>"
                )).join("");
            } catch (_) {
                if (!silent) {
                    logsMeta.textContent = "Failed to load logs.";
                    logsBody.innerHTML = "<tr><td class='muted' colspan='7'>Network error.</td></tr>";
                }
            }
        }

        function setBadge(text, cls) {
            camBadge.textContent = text;
            camBadge.className = "badge " + cls;
        }

        async function pollStatus() {
            if (!liveOpen) return;
            try {
                const res = await fetch("/api/live/status", {
                    credentials: "include",
                    headers: authHeaders(),
                });
                if (!res.ok) { setBadge("Login required", "badge-off"); return; }
                const data = await res.json();
                const worker = data.camera_worker || {};
                if (!worker.running || worker.camera_count === 0) {
                    showNoCamera("No camera configured. Add one in Admin.");
                    return;
                }
                if (data.has_frame) setBadge("Live", "badge-live");
                else if (data.connected) setBadge("Camera OK", "badge-wait");
                else setBadge("Waiting", "badge-wait");
            } catch (_) {
                setBadge("Offline", "badge-off");
            }
        }

        function showNoCamera(message) {
            streamImg.src = "";
            streamImg.style.display = "none";
            placeholder.style.display = "flex";
            placeholder.textContent = message || "No camera configured. Add one in Admin.";
            setBadge("No camera", "badge-off");
        }

        async function startLiveStream() {
            liveOpen = true;
            livePanel.classList.add("open");
            livePanel.setAttribute("aria-hidden", "false");
            toggleLiveBtn.textContent = "■ Hide camera";
            placeholder.style.display = "flex";
            placeholder.textContent = "Connecting to camera…";
            streamImg.style.display = "none";
            streamImg.src = "";

            try {
                const res = await fetch("/api/live/status", {
                    credentials: "include",
                    headers: authHeaders(),
                });
                if (!res.ok) {
                    showNoCamera("Log in to view the live camera.");
                    return;
                }
                const data = await res.json();
                const worker = data.camera_worker || {};
                if (!worker.running || worker.camera_count === 0) {
                    showNoCamera("No camera configured. Add one in Admin.");
                    return;
                }
            } catch (_) {
                showNoCamera("Cannot reach the server.");
                return;
            }

            streamImg.src = "/api/live/stream?t=" + Date.now();
            pollStatus();
            if (statusTimer) clearInterval(statusTimer);
            statusTimer = setInterval(pollStatus, 5000);
        }

        function stopLiveStream() {
            liveOpen = false;
            livePanel.classList.remove("open");
            livePanel.setAttribute("aria-hidden", "true");
            toggleLiveBtn.textContent = "▶ Live camera";
            streamImg.src = "";
            streamImg.style.display = "none";
            placeholder.style.display = "flex";
            placeholder.textContent = "Live camera hidden.";
            setBadge("Off", "badge-off");
            if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
        }

        streamImg.onload = function () {
            placeholder.style.display = "none";
            streamImg.style.display = "block";
            setBadge("Live", "badge-live");
        };

        streamImg.onerror = function () {
            if (!liveOpen) return;
            showNoCamera("No camera stream available. Check Admin camera settings.");
        };

        prevBtn.addEventListener("click", () => loadLogs(currentPage - 1));
        nextBtn.addEventListener("click", () => loadLogs(currentPage + 1));
        refreshBtn.addEventListener("click", () => loadLogs(currentPage));
        toggleLiveBtn.addEventListener("click", () => {
            if (liveOpen) stopLiveStream();
            else startLiveStream();
        });
        hideLiveBtn.addEventListener("click", stopLiveStream);

        function startLogsAutoRefresh() {
            if (logsRefreshTimer) clearInterval(logsRefreshTimer);
            logsRefreshTimer = setInterval(() => {
                loadLogs(currentPage, { silent: true });
            }, LOGS_REFRESH_MS);
        }

        loadLogs(1);
        startLogsAutoRefresh();
    </script>
</body>
</html>
