<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — ParkGuard</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #4493f8;
            --accent-hover: #58a6ff;
            --accent-dim: rgba(68,147,248,.12);
            --green: #3fb950;
            --green-dim: rgba(63,185,80,.12);
            --red: #f85149;
            --red-dim: rgba(248,81,73,.12);
            --r: 7px;
            --r-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-size: 14px;
            line-height: 1.5;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
            text-decoration: none;
            color: var(--text);
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem 1.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .card-subtitle {
            font-size: 0.825rem;
            color: var(--text-muted);
        }

        .card-body {
            padding: 1.5rem 1.75rem;
            display: grid;
            gap: 1rem;
        }

        .field {
            display: grid;
            gap: 0.4rem;
        }

        label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--r);
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.925rem;
            font-family: inherit;
            transition: border-color .15s, box-shadow .15s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input::placeholder { color: #4a5568; }

        .btn-submit {
            width: 100%;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: var(--r);
            background: var(--accent);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s, transform .1s;
        }

        .btn-submit:hover { background: var(--accent-hover); }
        .btn-submit:active { transform: scale(.99); }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        .message {
            display: none;
            padding: 0.7rem 0.9rem;
            border-radius: var(--r);
            font-size: 0.825rem;
            line-height: 1.4;
        }

        .message.show { display: block; }
        .message.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,81,73,.25); }
        .message.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,.25); }

        .card-footer {
            padding: 1rem 1.75rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .card-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <a href="/" class="brand">
            <div class="brand-icon">P</div>
            <span class="brand-name">ParkGuard</span>
        </a>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Welcome back</div>
                <div class="card-subtitle">Sign in to access the parking dashboard</div>
            </div>

            <div class="card-body">
                <div id="errorMessage" class="message error"></div>
                <div id="successMessage" class="message success"></div>

                <form id="loginForm" style="display:contents;">
                    <div class="field">
                        <label for="username">Username</label>
                        <input id="username" name="username" type="text" autocomplete="username" required placeholder="Enter your username">
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Enter your password">
                    </div>
                    <button id="submitBtn" type="submit" class="btn-submit">Sign in</button>
                </form>
            </div>

            <div class="card-footer">
                <a href="/">← Back to monitor</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const submitBtn = document.getElementById("submitBtn");
        const errorMessage = document.getElementById("errorMessage");
        const successMessage = document.getElementById("successMessage");

        function setMessage(target, message) {
            errorMessage.classList.remove("show");
            successMessage.classList.remove("show");
            if (!message) return;
            target.textContent = message;
            target.classList.add("show");
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setMessage(errorMessage, "");
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in…";
            try {
                const response = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("username").value.trim(),
                        password: document.getElementById("password").value,
                    }),
                });
                const payload = await response.json();
                if (!response.ok) {
                    setMessage(errorMessage, payload.error || "Login failed.");
                    return;
                }
                localStorage.setItem("access_token", payload.access_token || "");
                localStorage.setItem("refresh_token", payload.refresh_token || "");
                localStorage.setItem("token_type", payload.token_type || "Bearer");
                setMessage(successMessage, "Login successful. Redirecting…");
                setTimeout(() => { window.location.href = "/"; }, 450);
            } catch (_) {
                setMessage(errorMessage, "Request failed. Please try again.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign in";
            }
        });
    </script>
</body>
</html>
