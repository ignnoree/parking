<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | Parking ANPR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #1a2634;
        }
        .topbar {
            background: #1a2634;
            color: #fff;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .topbar h1 { font-size: 1.2rem; }
        .topbar nav a { color: #93c5fd; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
        main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; display: grid; gap: 1.5rem; }
        section {
            background: #fff;
            border-radius: 0.75rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            padding: 1.25rem 1.5rem;
        }
        h2 { font-size: 1.05rem; margin-bottom: 0.75rem; }
        .muted { color: #6b7a88; font-size: 0.88rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 0.55rem 0.4rem; border-bottom: 1px solid #eef2f6; }
        th { font-size: 0.75rem; text-transform: uppercase; color: #6b7a88; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        label { display: grid; gap: 0.3rem; font-size: 0.75rem; font-weight: 600; color: #4a5a68; text-transform: uppercase; }
        input, select {
            padding: 0.55rem 0.65rem;
            border: 1px solid #dde3e9;
            border-radius: 0.45rem;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        button, .btn {
            border: none;
            border-radius: 0.5rem;
            background: #1a2634;
            color: #fff;
            font-weight: 600;
            padding: 0.6rem 0.9rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        button.secondary { background: #e8edf2; color: #1a2634; }
        button.danger { background: #b91c1c; }
        button.small { padding: 0.35rem 0.6rem; font-size: 0.78rem; }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .message { display: none; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.88rem; }
        .message.show { display: block; }
        .message.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .message.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
        .badge-on { background: #dcfce7; color: #166534; }
        .badge-off { background: #f3f4f6; color: #6b7280; }
        #loginGate { text-align: center; padding: 3rem 1rem; }
    </style>
</head>
<body>
    <header class="topbar">
        <h1>Admin panel</h1>
        <nav>
            <a href="/">Monitor</a>
            <a href="/submit">Register vehicle</a>
            <a href="/login">Login</a>
        </nav>
    </header>

    <main>
        <div id="message" class="message"></div>

        <section id="loginGate">
            <p class="muted">Sign in as <strong>parking_admin</strong> or <strong>system_admin</strong> to manage cameras.</p>
            <p style="margin-top:1rem;"><a href="/login">Go to login</a></p>
        </section>

        <section id="camerasSection" style="display:none;">
            <h2>Cameras</h2>
            <p class="muted">Configure entry/exit cameras. Changes reload the camera worker automatically.</p>
            <div id="workerStatus" class="muted" style="margin:0.5rem 0;"></div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Protocol</th>
                        <th>Source</th>
                        <th>Gate</th>
                        <th>Light</th>
                        <th>Detect (s)</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="camerasBody">
                    <tr><td colspan="8" class="muted">Loading…</td></tr>
                </tbody>
            </table>

            <h2 style="margin-top:1.5rem;" id="formTitle">Add camera</h2>
            <form id="cameraForm" class="form-grid">
                <input type="hidden" id="cameraId" value="">
                <label>Name<input id="name" required placeholder="Entry gate"></label>
                <label>Protocol
                    <select id="protocol">
                        <option value="rtsp">rtsp</option>
                        <option value="http">http</option>
                        <option value="usb">usb</option>
                    </select>
                </label>
                <label>Source<input id="source" required placeholder="rtsp://… or 0 for USB"></label>
                <label>Gate role
                    <select id="gate_role">
                        <option value="entry">entry</option>
                        <option value="exit">exit</option>
                    </select>
                </label>
                <label>Light profile
                    <select id="light_profile">
                        <option value="normal">normal</option>
                        <option value="high_glare">high_glare</option>
                        <option value="low_light">low_light</option>
                    </select>
                </label>
                <label>Detection interval (s)<input id="frame_interval_seconds" type="number" min="0.5" step="0.1" placeholder="1.0" title="How often to run plate OCR — does not affect live preview FPS"></label>
                <label>Enabled
                    <select id="is_enabled">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </label>
            </form>
            <div class="btn-row">
                <button type="button" id="saveBtn">Save camera</button>
                <button type="button" class="secondary" id="cancelEditBtn" style="display:none;">Cancel edit</button>
            </div>
        </section>
    </main>

    <script>
        const messageEl = document.getElementById("message");
        const loginGate = document.getElementById("loginGate");
        const camerasSection = document.getElementById("camerasSection");
        const camerasBody = document.getElementById("camerasBody");
        const workerStatus = document.getElementById("workerStatus");
        const cameraForm = document.getElementById("cameraForm");
        const formTitle = document.getElementById("formTitle");
        const cancelEditBtn = document.getElementById("cancelEditBtn");

        function authHeaders() {
            const token = localStorage.getItem("access_token");
            return token ? { Authorization: "Bearer " + token, "Content-Type": "application/json" } : {};
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = "message show " + type;
        }

        function clearMessage() {
            messageEl.className = "message";
        }

        function resetForm() {
            document.getElementById("cameraId").value = "";
            cameraForm.reset();
            document.getElementById("is_enabled").value = "true";
            formTitle.textContent = "Add camera";
            cancelEditBtn.style.display = "none";
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(url, { credentials: "include", ...options, headers: { ...authHeaders(), ...(options.headers || {}) } });
            if (res.status === 401 || res.status === 403) {
                loginGate.style.display = "block";
                camerasSection.style.display = "none";
                throw new Error(res.status === 401 ? "Please log in." : "Admin access required.");
            }
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.message || data.error || "Request failed");
            return data;
        }

        function renderCameras(cameras) {
            if (!cameras.length) {
                camerasBody.innerHTML = '<tr><td colspan="8" class="muted">No cameras configured.</td></tr>';
                return;
            }
            camerasBody.innerHTML = cameras.map(c => `
                <tr data-camera-id="${c.id}">
                    <td>${escapeHtml(c.name)}</td>
                    <td>${escapeHtml(c.protocol)}</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(c.source)}</td>
                    <td>${escapeHtml(c.gate_role)}</td>
                    <td>${escapeHtml(c.light_profile)}</td>
                    <td>${c.frame_interval_seconds ?? "default"}</td>
                    <td><span class="badge ${c.is_enabled ? "badge-on" : "badge-off"}">${c.is_enabled ? "On" : "Off"}</span></td>
                    <td>
                        <button type="button" class="small secondary" data-edit="${c.id}">Edit</button>
                        <button type="button" class="small danger" data-del="${c.id}">Delete</button>
                    </td>
                </tr>
            `).join("");
        }

        function escapeHtml(s) {
            return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function renderWorkerStatus(status) {
            const w = (status && status.camera_worker) || {};
            workerStatus.textContent = w.running
                ? `Worker running — ${w.camera_count} camera(s), primary id ${w.primary_camera_id ?? "—"}`
                : "Worker not running (no enabled cameras?)";
        }

        async function loadCameras() {
            const data = await apiFetch("/api/cameras");
            renderCameras(data.cameras || []);
            try {
                const status = await apiFetch("/api/live/status");
                renderWorkerStatus(status);
            } catch (_) {
                workerStatus.textContent = "Worker status unavailable (reload may be in progress).";
            }
        }

        function upsertCameraRow(camera) {
            if (!camera || camera.id == null) return;
            const rows = Array.from(camerasBody.querySelectorAll("tr[data-camera-id]"));
            const existing = rows.find((row) => row.dataset.cameraId === String(camera.id));
            const html = `
                <tr data-camera-id="${camera.id}">
                    <td>${escapeHtml(camera.name)}</td>
                    <td>${escapeHtml(camera.protocol)}</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(camera.source)}</td>
                    <td>${escapeHtml(camera.gate_role)}</td>
                    <td>${escapeHtml(camera.light_profile)}</td>
                    <td>${camera.frame_interval_seconds ?? "default"}</td>
                    <td><span class="badge ${camera.is_enabled ? "badge-on" : "badge-off"}">${camera.is_enabled ? "On" : "Off"}</span></td>
                    <td>
                        <button type="button" class="small secondary" data-edit="${camera.id}">Edit</button>
                        <button type="button" class="small danger" data-del="${camera.id}">Delete</button>
                    </td>
                </tr>
            `;
            if (existing) {
                existing.outerHTML = html;
                return;
            }
            if (rows.length === 0 || camerasBody.querySelector(".muted")) {
                camerasBody.innerHTML = html;
            } else {
                camerasBody.insertAdjacentHTML("beforeend", html);
            }
        }

        function removeCameraRow(cameraId) {
            const row = camerasBody.querySelector(`tr[data-camera-id="${cameraId}"]`);
            if (row) row.remove();
            if (!camerasBody.querySelector("tr[data-camera-id]")) {
                camerasBody.innerHTML = '<tr><td colspan="8" class="muted">No cameras configured.</td></tr>';
            }
        }

        camerasBody.addEventListener("click", async (e) => {
            const editId = e.target.getAttribute("data-edit");
            const delId = e.target.getAttribute("data-del");
            if (editId) {
                const data = await apiFetch("/api/cameras");
                const cam = (data.cameras || []).find(c => String(c.id) === editId);
                if (!cam) return;
                document.getElementById("cameraId").value = cam.id;
                document.getElementById("name").value = cam.name;
                document.getElementById("protocol").value = cam.protocol;
                document.getElementById("source").value = cam.source;
                document.getElementById("gate_role").value = cam.gate_role;
                document.getElementById("light_profile").value = cam.light_profile;
                document.getElementById("frame_interval_seconds").value = cam.frame_interval_seconds ?? "";
                document.getElementById("is_enabled").value = cam.is_enabled ? "true" : "false";
                formTitle.textContent = "Edit camera";
                cancelEditBtn.style.display = "inline-block";
                return;
            }
            if (delId && confirm("Delete this camera?")) {
                try {
                    await apiFetch("/api/cameras/" + delId, { method: "DELETE" });
                    showMessage("Camera deleted.", "success");
                    resetForm();
                    removeCameraRow(delId);
                    loadCameras().catch(() => {});
                } catch (err) {
                    showMessage(err.message, "error");
                }
            }
        });

        document.getElementById("saveBtn").addEventListener("click", async () => {
            clearMessage();
            const id = document.getElementById("cameraId").value;
            const intervalRaw = document.getElementById("frame_interval_seconds").value.trim();
            const payload = {
                name: document.getElementById("name").value.trim(),
                protocol: document.getElementById("protocol").value,
                source: document.getElementById("source").value.trim(),
                gate_role: document.getElementById("gate_role").value,
                light_profile: document.getElementById("light_profile").value,
                is_enabled: document.getElementById("is_enabled").value === "true",
            };
            if (intervalRaw) payload.frame_interval_seconds = parseFloat(intervalRaw);
            try {
                if (id) {
                    const res = await apiFetch("/api/cameras/" + id, { method: "PATCH", body: JSON.stringify(payload) });
                    showMessage("Camera updated.", "success");
                    upsertCameraRow(res.camera);
                } else {
                    const res = await apiFetch("/api/cameras", { method: "POST", body: JSON.stringify(payload) });
                    showMessage("Camera created.", "success");
                    upsertCameraRow(res.camera);
                }
                resetForm();
                loadCameras().catch(() => {});
            } catch (err) {
                showMessage(err.message, "error");
            }
        });

        cancelEditBtn.addEventListener("click", resetForm);

        (async function init() {
            if (!localStorage.getItem("access_token")) return;
            try {
                loginGate.style.display = "none";
                camerasSection.style.display = "block";
                await loadCameras();
            } catch (err) {
                showMessage(err.message, "error");
            }
        })();
    </script>
</body>
</html>
