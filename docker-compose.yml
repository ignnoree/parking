services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parking_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      PARKING_APP_DIR: /app
      PARKING_APP_PYTHON: python
      DATABASE_URL: postgresql://postgres:postgres@db:5432/parking_db
    volumes:
      - ./logs:/app/logs
      - ./collection:/app/collection
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  pgdata:
