# GPU overlay for production inference (requires NVIDIA Container Toolkit).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

services:
  app:
    environment:
      PLATE_USE_GPU: "true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
